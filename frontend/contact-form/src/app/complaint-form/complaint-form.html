<div class="container">
  <h2>Submit a Complaint</h2>
  <form (ngSubmit)="onSubmit()" #complaintForm="ngForm">
    <div class="mb-3">
      <label for="complaint" class="form-label">Complaint</label>
      <textarea
        id="complaint"
        class="form-control"
        name="complaint"
        required
        [(ngModel)]="complaintText"
        rows="5"
        placeholder="Enter your complaint...">
      </textarea>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input
        type="email"
        id="email"
        class="form-control"
        name="email"
        required
        [(ngModel)]="email"
        placeholder="Enter your email" />
    </div>

    <button class="btn btn-success" type="submit" [disabled]="!complaintForm.form.valid">
      Submit Complaint
    </button>
  </form>
</div>
